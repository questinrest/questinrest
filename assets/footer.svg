<svg xmlns="http://www.w3.org/2000/svg" width="900" height="40" viewBox="0 0 900 40">
  <defs>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="50%" style="stop-color:#0d0d3b"/>
      <stop offset="100%" style="stop-color:#080020"/>
    </linearGradient>
    <linearGradient id="fLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f7df5;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4f7df5"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="70%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="40" fill="url(#fBg)"/>
  <line x1="0" y1="4" x2="900" y2="4" stroke="url(#fLine)" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </line>
  <text x="450" y="28" fill="#4a5568" font-family="'Courier New', 'SFMono-Regular', monospace" font-size="10" text-anchor="middle" letter-spacing="3">
