<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <!-- Deep cosmic gradient — inspired by GitHub Universe -->
    <linearGradient id="cosmicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0015"/>
      <stop offset="25%" style="stop-color:#0d0d3b"/>
      <stop offset="50%" style="stop-color:#1a1060"/>
      <stop offset="75%" style="stop-color:#12084a"/>
      <stop offset="100%" style="stop-color:#080020"/>
    </linearGradient>

    <!-- Electric blue glow -->
    <radialGradient id="glowBlue" cx="30%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#4f7df5;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4f7df5;stop-opacity:0"/>
    </radialGradient>

    <!-- Magenta/purple glow -->
    <radialGradient id="glowPurple" cx="75%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>

    <!-- Cyan accent glow -->
    <radialGradient id="glowCyan" cx="85%" cy="80%" r="25%">
      <stop offset="0%" style="stop-color:#06d6a0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f7df5;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#4f7df5"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="80%" style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:0"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base cosmic background -->
  <rect width="900" height="220" fill="url(#cosmicBg)"/>

  <!-- Atmospheric glow layers -->
  <rect width="900" height="220" fill="url(#glowBlue)"/>
  <rect width="900" height="220" fill="url(#glowPurple)"/>
  <rect width="900" height="220" fill="url(#glowCyan)"/>

  <!-- Tiny star dots -->
  <circle cx="120" cy="30" r="0.8" fill="#ffffff" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="55" r="0.6" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="25" r="0.9" fill="#a855f7" opacity="0.35">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="65" r="0.7" fill="#4f7df5" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.45;0.1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="185" r="0.5" fill="#06d6a0" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="190" r="0.7" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="195" r="0.6" fill="#a855f7" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="140" r="0.5" fill="#4f7df5" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="110" r="0.6" fill="#ffffff" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Name -->
  <text x="450" y="90" fill="url(#nameGrad)" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" text-anchor="middle" letter-spacing="4" filter="url(#softGlow)">
    AMAN MISHRA
  </text>

  <!-- Role -->
  <text x="450" y="125" fill="#94a3b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="middle" letter-spacing="5">
    AI / ML ENGINEER
  </text>

  <!-- Accent line -->
  <line x1="280" y1="148" x2="620" y2="148" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Descriptor -->
  <text x="450" y="175" fill="#64748b" font-family="'Courier New', 'SFMono-Regular', monospace" font-size="11" text-anchor="middle" letter-spacing="2">
    LLM SYSTEMS  |  RAG PIPELINES  |  PRODUCTION AI
  </text>

  <!-- Subtle top border glow -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.5"/>

  <!-- Bottom border -->
  <rect x="0" y="218" width="900" height="2" fill="url(#lineGrad)" opacity="0.3"/>
</svg>