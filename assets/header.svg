<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#CCFF00"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="100%" style="stop-color:#c9d1d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#58a6ff" stroke-width="0.5">
      <animate attributeName="x1" values="0;900;0" dur="60s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;900;0" dur="60s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="900" y2="0" stroke="#58a6ff" stroke-width="0.5">
      <animate attributeName="y1" values="0;200;0" dur="40s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;200;0" dur="40s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Decorative dots -->
  <circle cx="50" cy="40" r="1.5" fill="#58a6ff" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="160" r="1.5" fill="#CCFF00" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="35" r="1" fill="#58a6ff" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="165" r="1" fill="#CCFF00" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Name -->
  <text x="450" y="82" fill="url(#textGrad)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle" letter-spacing="2" filter="url(#glow)">
    AMAN MISHRA
  </text>

  <!-- Tagline -->
  <text x="450" y="115" fill="#8b949e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" text-anchor="middle" letter-spacing="3">
    AI/ML ENGINEER
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Separator line -->
  <line x1="340" y1="132" x2="560" y2="132" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="450" y="155" fill="#58a6ff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" letter-spacing="1.5" opacity="0.7">
    LLM Systems · RAG Pipelines · Agentic AI
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="198" width="900" height="2" fill="url(#accent)" opacity="0.3"/>
</svg>